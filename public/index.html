<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DeliverYa — Pedidos a Domicilio</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <!-- Stripe.js -->
  <script src="https://js.stripe.com/v3/"></script>
  <!-- Socket.IO -->
  <script src="/socket.io/socket.io.js"></script>
  <!-- Custom CSS -->
  <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>

<!-- ══════════ NAVBAR ══════════ -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="mainNavbar">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="#" onclick="navegarA('home')">
      <img src="/images/Deliver.png" alt="DeliverYa" class="logo-navbar">
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="#" onclick="navegarA('menu')"><i class="bi bi-grid me-1"></i>Menú</a></li>
        <li class="nav-item d-none" id="navPedidos"><a class="nav-link" href="#" onclick="navegarA('mis-pedidos')"><i class="bi bi-bag-check me-1"></i>Mis Pedidos</a></li>
        <li class="nav-item d-none" id="navAdmin"><a class="nav-link" href="#" onclick="navegarA('admin')"><i class="bi bi-shield-check me-1"></i>Administración</a></li>
        <li class="nav-item d-none" id="navRepartidor"><a class="nav-link" href="#" onclick="navegarA('repartidor')"><i class="bi bi-bicycle me-1"></i>Mis Entregas</a></li>
      </ul>
      <div class="d-flex align-items-center gap-2">
        <!-- Carrito -->
        <button class="btn btn-outline-light btn-sm position-relative" onclick="abrirCarrito()" id="btnCarrito">
          <i class="bi bi-cart3"></i>
          <span class="badge bg-warning text-dark position-absolute top-0 start-100 translate-middle" id="contadorCarrito" style="display:none">0</span>
        </button>
        <!-- Auth -->
        <div id="authButtons">
          <button class="btn btn-outline-light btn-sm me-1" onclick="navegarA('login')">Ingresar</button>
          <button class="btn btn-warning btn-sm text-dark fw-600" onclick="navegarA('registro')">Registrarse</button>
        </div>
        <div id="userMenu" class="d-none">
          <div class="dropdown">
            <button class="btn btn-outline-light btn-sm dropdown-toggle" data-bs-toggle="dropdown">
              <i class="bi bi-person-circle me-1"></i><span id="userName"></span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="#" onclick="navegarA('perfil')"><i class="bi bi-person me-2"></i>Mi Perfil</a></li>
              <li><a class="dropdown-item" href="#" onclick="navegarA('mis-pedidos')"><i class="bi bi-bag-check me-2"></i>Mis Pedidos</a></li>
              <li><hr class="dropdown-divider"/></li>
              <li><a class="dropdown-item text-danger" href="#" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right me-2"></i>Salir</a></li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- ══════════ CONTENIDO PRINCIPAL ══════════ -->
<main id="appContent"></main>

<!-- ══════════ MODAL CARRITO ══════════ -->
<div class="modal fade" id="modalCarrito" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-cart3 me-2"></i>Mi Carrito</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="contenidoCarrito">
        <p class="text-center text-muted py-4"><i class="bi bi-cart-x display-4 d-block mb-2"></i>Tu carrito está vacío</p>
      </div>
      <div class="modal-footer" id="footerCarrito" style="display:none!important">
        <div class="w-100">
          <div class="d-flex justify-content-between mb-2">
            <span>Subtotal:</span><strong id="subtotalCarrito">$0</strong>
          </div>
          <div class="d-flex justify-content-between mb-3">
            <span>Envío:</span><strong>$5.000</strong>
          </div>
          <div class="d-flex justify-content-between mb-3 fs-5">
            <strong>Total:</strong><strong class="text-warning" id="totalCarrito">$0</strong>
          </div>
          <button class="btn btn-warning w-100 text-dark fw-600" onclick="procederPago()">
            <i class="bi bi-credit-card me-2"></i>Proceder al Pago
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════ MODAL SEGUIMIENTO ══════════ -->
<div class="modal fade" id="modalSeguimiento" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-geo-alt me-2"></i>Seguimiento del Pedido</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="contenidoSeguimiento"></div>
    </div>
  </div>
</div>

<!-- ══════════ TOAST ══════════ -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
  <div id="toast" class="toast align-items-center text-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
